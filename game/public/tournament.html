<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Mode</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #scoreboards, #ranking {
      margin-top: 10px;
      width: 100%;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid black;
      padding: 4px;
      text-align: center;
    }
    .side-panel {
      position: absolute;
      right: 0;
      top: 0;
      width: 300px;
      max-height: 100vh;
      overflow-y: auto;
      background: #f5f5f5;
      padding: 10px;
    }
    .game-area {
      margin-right: 320px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="createBtn">CREATE TOURNAMENT</button>
    <button id="joinBtn">JOIN TOURNAMENT</button>
  </div>

  <div class="game-area">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <h3>Ranking</h3>
    <div id="ranking">
      <table>
        <tr><th>#</th><th>Player</th><th>Matches</th><th>Starts</th><th>Victories</th><th>+Pts</th><th>Pts</th></tr>
      </table>
    </div>
  </div>

  <div class="side-panel">
    <h3>Rodadas</h3>
    <div id="scoreboards">
      <table>
        <tr><th>Player 1</th><th>Score</th><th>Player 2</th><th>Score</th></tr>
      </table>
    </div>
  </div>

  <script src="game.js"></script>
  <script src="tournament.js"></script>
</body>
</html>
