  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      - PUBLIC_KEY_BASE64=${PUBLIC_KEY_BASE64}
    networks:
      - internal_network
      - external_network
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - event-bus 
      - user-mgmt
    volumes:
      - ./api-gateway:/app
      - ./pckg/redis:/app/pckg/redis:ro 

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      - PRIVATE_KEY_BASE64=${PRIVATE_KEY_BASE64}
      - PUBLIC_KEY_BASE64=${PUBLIC_KEY_BASE64}
    networks:
      - internal_network
    expose:
      - "4000"
    depends_on:
      - event-bus  
    volumes:
      - auth-data:/app/data 
      - ./pckg/redis:/app/pckg/redis:ro 

  event-bus:
    build:
      context: ./event-bus
    container_name: event-bus
    networks:
      - internal_network
    expose:
      - "6379" 
    volumes:
      - event-data:/data

  user-mgmt:
    build:
      context: ./user-mgmt
    container_name: user-mgmt
    networks:
      - internal_network
    expose:
      - "5000" 
    volumes:
      - user-data:/app/data 
      - ./pckg/redis:/app/pckg/redis:ro 

networks:
  internal_network:
    name: internal_network
    driver: bridge

  external_network:
    name: external_network
    driver: bridge

volumes:
  user-data:
    name: user-data
  auth-data:
    name: auth-data
  event-data:
    name: event-data
  # shared-keys:

