services:
  frontend-builder:
    build:
      context: ./Front
      dockerfile: Dockerfile
    volumes:
      - frontend-build:/app/dist
    profiles: ["builder"]

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      - JWT_PUBLIC_KEY_BASE64=${JWT_PUBLIC_KEY_BASE64}
      - SSL_CERT_BASE64=${SSL_CERT_BASE64}
      - SSL_KEY_BASE64=${SSL_KEY_BASE64}
    networks:
      - internal_network
      - external_network
    ports:
      - "443:443"
    depends_on:
      - auth-service
      - event-bus 
      - user-mgmt
    volumes:
      - ./user-mgmt/avatars:/app/static/avatars # acesso a avatars do user-mgmt
      - frontend-build:/app/frontend
      # - ./MinimalFrontend/dist:/app/frontend # acesso ao MinimalFrontend estático
      - ./pckg/redis:/app/pckg/redis:ro # acesso ao redis e funções auxiliares


  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      - JWT_PRIVATE_KEY_BASE64=${JWT_PRIVATE_KEY_BASE64}
      - JWT_PUBLIC_KEY_BASE64=${JWT_PUBLIC_KEY_BASE64}
    networks:
      - internal_network
    expose:
      - "4000"
    depends_on:
      - event-bus  
    volumes:
      - auth-data:/app/data  # persistência de DB de autenticação
      - ./pckg/redis:/app/pckg/redis:ro # acesso ao redis e funções auxiliares

  event-bus:
    build:
      context: ./event-bus
    container_name: event-bus
    networks:
      - internal_network
    expose:
      - "6379" 
    volumes:
      - event-data:/data

  user-mgmt:
    build:
      context: ./user-mgmt
    container_name: user-mgmt
    networks:
      - internal_network
    expose:
      - "5000" 
    volumes:
      - user-data:/app/data # persistência de DB e avatares de perfil de usuário
      - ./user-mgmt/avatars:/app/avatars  # acesso a avatars do user-mgmt
      - ./pckg/redis:/app/pckg/redis:ro # acesso ao redis e funções auxiliares

  tournament-service:
    build:
      context: ./tournament-service
    container_name: tournament-service
    networks:
      - internal_network
    expose:
      - "8000"
    volumes:
      - ./pckg/redis:/app/pckg/redis:ro # acesso ao redis e funções auxiliares
      - tournament-data:/app/data # persistência de DB de torneios
    depends_on:
      - event-bus

networks:
  internal_network:
    name: internal_network
    driver: bridge

  external_network:
    name: external_network
    driver: bridge

volumes:
  user-data:
    name: user-data
  auth-data:
    name: auth-data
  event-data:
    name: event-data
  tournament-data:
    name: tournament-data
  frontend-build:
    name: frontend-build

