services:
  # =======================
  # PROMETHEUS
  # =======================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - internal_network
    depends_on:
      - cadvisor
      - redis-exporter

  # =======================
  # GRAFANA
  # =======================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - internal_network
    depends_on:
      - prometheus

  # =======================
  # cADVISOR (containers)
  # =======================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "9092:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal_network

  # =======================
  # REDIS EXPORTER
  # =======================
  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    environment:
    - REDIS_ADDR=redis://event-bus:6379
    ports:
      - "9093:9121"
    networks:
      - internal_network

networks:
  internal_network:
    external: true   # usa a mesma rede dos microserviços

volumes:
  grafana_data: